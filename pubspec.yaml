name: app_andsport
description: "Aplicativo AndSport"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  cloud_functions: ^6.3.1
  qr_flutter: ^4.1.0

  # IA Gemini
  google_generative_ai: ^0.4.7

  # HTTP
  http: ^1.6.0

  # Utilidades
  url_launcher: ^6.3.2
  image_picker: ^1.2.2

  # Vídeos
  youtube_player_flutter: ^9.1.3
  youtube_player_iframe: ^6.0.0

  # Gráficos
  fl_chart: ^1.2.0

  # Tema e tipografia
  google_fonts: ^6.2.1

  # Notificações push
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^18.0.1

  # Armazenamento local (onboarding + preferências)
  shared_preferences: ^2.3.3

  # Cache offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Conectividade (sincronização automática)
  connectivity_plus: ^6.1.1

  # Vibração (cronômetro de descanso)
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21